<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>接客日報 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#1f2530; --line:#c9ced8; --line-strong:#9aa3b2;
    --head:#2c3340; --head-sub:#3a424f; --bg:#eef1f5; --paper:#ffffff;
    --zebra:#f7f9fc; --accent:#2f6db5; --ok:#1f8a4c; --ng:#c1392b;
    --done:#2f6db5; --muted:#7a8494;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:18px 14px 80px;}
  .titlebar{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:14px;}
  .titlebar h1{font-size:20px;margin:0;letter-spacing:.04em;font-weight:700;}
  .titlebar h1 span{color:var(--muted);font-weight:500;font-size:13px;display:block;margin-top:2px;letter-spacing:.02em;}
  .datebox{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 14px;}
  .datebox label{font-size:12px;color:var(--muted);}
  .datebox input[type=date]{font-size:16px;border:1px solid var(--line-strong);border-radius:7px;padding:6px 8px;font-family:inherit;color:var(--ink);background:#fff;}
  .ymd{font-size:17px;font-weight:700;letter-spacing:.06em;white-space:nowrap;}
  .ymd .wd{color:var(--accent);}
  .sync{font-size:12px;padding:5px 10px;border-radius:999px;border:1px solid var(--line);cursor:pointer;white-space:nowrap;align-self:center;font-weight:600;}
  .sync-saved{color:#1f8a4c;border-color:#bfe0cb;background:#f0faf4;}
  .sync-saving,.sync-loading{color:var(--accent);border-color:#b8c6da;background:#eef4fb;}
  .sync-error{color:var(--ng);border-color:#e0b4ae;background:#fbeeec;}
  .sync-local{color:var(--muted);background:#f3f5f8;}

  .tabs{display:flex;gap:6px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:12px;border:1px solid var(--line-strong);background:#fff;border-radius:9px;cursor:pointer;font-size:15px;font-weight:700;color:var(--muted);font-family:inherit;}
  .tab.active{background:var(--head);color:#fff;border-color:var(--head);}

  .btn{font-family:inherit;font-size:13px;cursor:pointer;border-radius:8px;padding:8px 14px;border:1px solid var(--line-strong);background:#fff;color:var(--ink);transition:background .12s ease;}
  .btn:hover{background:#f0f3f8;}
  .btn.primary{background:var(--head);border-color:var(--head);color:#fff;}
  .btn.primary:hover{background:#3a424f;}
  .btn:disabled{opacity:.6;cursor:default;}
  .btn.danger{color:var(--ng);border-color:#e0b4ae;}
  .btn.danger:hover{background:#fbeeec;}

  .card-box{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .card-box h2{font-size:15px;margin:0 0 14px;font-weight:700;letter-spacing:.04em;color:var(--head);}

  .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 12px;}
  .f-field{display:flex;flex-direction:column;gap:4px;}
  .f-field.wide{grid-column:1 / -1;}
  .f-field label{font-size:11px;color:var(--muted);}
  .f-field input,.f-field select{font-family:inherit;font-size:16px;border:1px solid var(--line-strong);border-radius:7px;padding:8px;color:var(--ink);background:#fff;width:100%;}
  .f-field select{-webkit-appearance:none;appearance:none;}
  .catch-field{grid-column:span 2;}
  .catch-row{display:flex;gap:6px;}
  .catch-row .catch-sel{flex:0 0 44%;width:auto;min-width:96px;}
  .catch-row .catch-name{flex:1 1 auto;min-width:0;}
  .time-row{display:flex;gap:6px;}
  .time-row input{flex:1;}
  .time-now{white-space:nowrap;font-family:inherit;font-size:13px;border:1px solid var(--line-strong);border-radius:7px;background:#f0f3f8;cursor:pointer;padding:0 12px;color:var(--ink);}
  .time-now:hover{background:#e6ebf3;}

  .sec-title{font-size:13px;font-weight:700;color:var(--head);margin:18px 0 8px;border-left:3px solid var(--accent);padding-left:8px;}
  .content-box{border:1px solid var(--line);border-radius:9px;padding:12px;background:#fafbfd;}
  .sub-lab{font-size:12px;color:var(--muted);margin:0 0 8px;font-weight:700;}
  .mob-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .mob-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff;}
  .mob-row .lab{font-size:14px;}
  .stepper{display:flex;align-items:center;gap:6px;}
  .stepper button{width:36px;height:36px;border:1px solid var(--line-strong);background:#f0f3f8;border-radius:7px;font-size:20px;cursor:pointer;line-height:1;color:var(--ink);font-family:inherit;}
  .stepper button:hover{background:#e6ebf3;}
  .stepper input{width:52px;height:36px;text-align:center;font-size:16px;border:1px solid var(--line-strong);border-radius:7px;font-family:inherit;color:var(--ink);}
  .content-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px 12px;}

  .entry-actions{display:flex;gap:8px;margin-top:16px;}

  .recent{margin-top:18px;}
  .recent h3{font-size:12px;color:var(--muted);margin:0 0 8px;font-weight:700;}
  .rlist{display:flex;flex-direction:column;gap:6px;}
  .ritem{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;}
  .ritem .meta{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .ritem .body{flex:1;min-width:0;}
  .ritem .body b{color:var(--ink);}
  .ritem .body .det{color:#4a5260;display:block;margin-top:2px;line-height:1.4;}
  .x-btn{border:1px solid #e0b4ae;color:var(--ng);background:#fff;border-radius:7px;cursor:pointer;font-size:12px;padding:5px 9px;font-family:inherit;white-space:nowrap;}
  .x-btn:hover{background:#fbeeec;}
  .e-btn{border:1px solid #b8c6da;color:var(--accent);background:#fff;border-radius:7px;cursor:pointer;font-size:12px;padding:5px 9px;font-family:inherit;white-space:nowrap;}
  .e-btn:hover{background:#eef4fb;}
  .ritem-ops{display:flex;gap:6px;flex-shrink:0;}
  .c-op{white-space:nowrap;}
  .c-op .e-btn{margin-right:4px;}
  .empty{color:var(--muted);font-size:13px;padding:14px;text-align:center;}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px;}

  .tot-group{margin-bottom:16px;}
  .sheet-view{display:flex;flex-direction:column;}
  .sheet-view .toolbar{order:1;}
  .sheet-view .sheet{order:2;margin-bottom:14px;}
  .sheet-view .card-box{order:3;}
  .sheet-view .hint{order:4;}
  .tot-group h3{font-size:13px;margin:0 0 8px;color:var(--head);border-left:3px solid var(--accent);padding-left:8px;font-weight:700;}
  .tot-cards{display:flex;flex-wrap:wrap;gap:8px;}
  .tcard{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 14px;min-width:96px;text-align:center;flex:1 1 96px;}
  .tcard .k{font-size:11px;color:var(--muted);margin-bottom:2px;}
  .tcard .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
  .tcard.accent{border-color:#b8c6da;background:#eef4fb;}
  .tcard.accent .v{color:var(--accent);}

  .sheet{background:var(--paper);border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(20,30,50,.06);}
  .scroll{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;min-width:880px;}
  th,td{border:1px solid var(--line);padding:7px 8px;font-size:13px;}
  thead th{background:var(--head);color:#fff;font-weight:600;letter-spacing:.03em;white-space:nowrap;}
  tbody tr:nth-child(even) td{background:var(--zebra);}
  .rownum{width:34px;text-align:center;color:var(--muted);background:#f1f4f8;font-variant-numeric:tabular-nums;}
  .c-time{white-space:nowrap;font-variant-numeric:tabular-nums;text-align:center;}
  .c-deal{text-align:center;font-weight:700;}
  .c-deal-cell{text-align:center;font-weight:700;}
  .c-sel{padding:2px;}
  .mini-sel{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;font-family:inherit;font-size:13px;padding:5px 4px;color:var(--ink);text-align:center;-webkit-appearance:none;appearance:none;cursor:pointer;}
  .mini-sel:focus{outline:none;background:#fff7d9;}
  .deal-ok{color:var(--ok);} .deal-ng{color:var(--ng);} .done{color:var(--done);font-weight:700;text-align:center;}
  .c-content{min-width:200px;}
  .c-content .ci,.c-use .ci{white-space:nowrap;}
  .c-use{white-space:normal;}
  .c-op{text-align:center;white-space:nowrap;}

  .hint{font-size:12px;color:var(--muted);margin:12px 2px 0;line-height:1.7;}

  @media print{
    body{background:#fff;}
    .tabs,.toolbar,.hint,.datebox label,.x-btn,.c-op{display:none;}
    .sheet{box-shadow:none;border-color:#888;}
    .wrap{padding:0;max-width:100%;}
    thead th{background:#444 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    @page{size:A4 portrait;margin:10mm;}
  }
  @media (max-width:560px){
    .titlebar h1{font-size:17px;} .ymd{font-size:15px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const WD = ["日","月","火","水","木","金","土"];
const KATCH_OPTS = ["", "社員", "Panasonic", "SONY", "REGZA", "SHARP", "Hisense"];
const DONE_OPTS = ["", "済"];
const OX_OPTS = ["", "◯", "✕"];
const USE_MOBILE_OPTS = ["", "docomo", "ahamo", "au", "UQ", "SB", "YM", "楽天", "格安"];
const USE_LINE_OPTS = ["", "ドコモ光", "home5G", "au光", "UQ WiMAX", "BIGLOBE光", "SB光", "NURO光", "Air", "CATV", "菅込", "その他", "未利用"];
const MOBILE_ITEMS = [
  { key:"sbT", label:"SB 端末MNP" },
  { key:"sbS", label:"SB SIM MNP" },
  { key:"ymT", label:"YM 端末MNP" },
  { key:"ymS", label:"YM SIM MNP" }
];
const BB_OPTS = ["", "1G光新規", "1G光事変", "10G光新規", "Air新規", "Air機変"];
const CARD_ITEMS = [
  { key:"cNormal", label:"ノーマル", s:"PayPayノーマル" },
  { key:"cGold", label:"GOLD", s:"PayPay GOLD" },
  { key:"cFamily", label:"家族カード", s:"家族カード" }
];

function pad(n){ return n < 10 ? "0" + n : "" + n; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function nowHM(){ const d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function newId(){ return "" + Date.now() + "_" + Math.floor(Math.random()*100000); }
function emptyMobile(){ return { sbT:0, sbS:0, ymT:0, ymS:0 }; }
function emptyCard(){ return { cNormal:0, cGold:0, cFamily:0 }; }
function emptyForm(){
  return { time:"", katch:"", katchName:"", close:"", deal:"", bw:"", emp:"",
    useMobile:"", useLine:"", mobile:emptyMobile(), bb:"", denki:"", gas:"", card:emptyCard() };
}
function storeKey(d){ return "uriage_nippo_v2_" + d; }
const LS_STORE_KEY = "uriage_nippo_store_v1";

/* ============================================================
   ★ 他端末と共有する設定（JSONBin.io）★
   ① https://jsonbin.io/ で無料登録 → 「CREATE BIN」で中身 {} の
      ビンを1つ作る → その Bin ID をコピー
   ② API KEYS から Master Key（または対象ビンに read/update 権限を
      付けた Access Key）をコピー
   ③ 下の2行に貼り付けて、CLOUD_ENABLED を true にして再デプロイ
   これで、このURLを開いた全端末が同じデータを見られます。
   ※ キーはページのソースから見えます。店舗内専用ツール用途として、
     可能なら Master Key ではなく権限を絞った Access Key を推奨。
     Access Key を使う場合は CLOUD_KEY_HEADER を "X-Access-Key" に。
   ============================================================ */
const CLOUD_ENABLED = true;
const JSONBIN_BIN_ID = "6a3695feda38895dfee2d382";
const JSONBIN_KEY    = "$2a$10$kb4606NT2s7sIqqcPuGTGefZ2uIaVqlXUD.T25aB0gi4KRdO5Ir22";
const CLOUD_KEY_HEADER = "X-Master-Key";
const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";

function cloudReady(){
  return CLOUD_ENABLED && JSONBIN_BIN_ID.indexOf("貼る") < 0 && JSONBIN_KEY.indexOf("貼る") < 0;
}
function normalizeStore(obj){
  const out = {};
  if(obj && typeof obj === "object"){
    Object.keys(obj).forEach(function(d){
      const arr = obj[d];
      if(Array.isArray(arr)){ out[d] = arr.map(normalizeRec).filter(recHasAny); }
    });
  }
  return out;
}
function migrateOldKeys(){
  const out = {};
  try{
    for(let i=0;i<window.localStorage.length;i++){
      const k = window.localStorage.key(i);
      if(k && k.indexOf("uriage_nippo_v2_") === 0){
        const d = k.substring("uriage_nippo_v2_".length);
        const p = JSON.parse(window.localStorage.getItem(k));
        if(Array.isArray(p)){ out[d] = p; }
      }
    }
  }catch(e){}
  return out;
}

function normalizeRec(o){
  o = o || {};
  const m = Object.assign(emptyMobile(), o.mobile || {});
  let card = emptyCard();
  if(o.card && typeof o.card === "object"){ card = Object.assign(emptyCard(), o.card); }
  else if(o.card === "ノーマル"){ card.cNormal = 1; }
  else if(o.card === "GOLD"){ card.cGold = 1; }
  return { id:o.id || newId(), time:o.time||"", katch:o.katch||"", katchName:o.katchName||"",
    close:o.close||"", deal:o.deal||"", bw:o.bw||"", emp:o.emp||"",
    useMobile:o.useMobile||"", useLine:o.useLine||"", mobile:m, bb:o.bb||"", denki:o.denki||"", gas:o.gas||"", card:card };
}
function mobTotalOf(r){ let t=0; for(let i=0;i<MOBILE_ITEMS.length;i++){ t += Number(r.mobile[MOBILE_ITEMS[i].key])||0; } return t; }
function cardTotalOf(r){ let t=0; const c=r.card||{}; for(let i=0;i<CARD_ITEMS.length;i++){ t += Number(c[CARD_ITEMS[i].key])||0; } return t; }
function recHasAny(r){
  return !!(r.time||r.katch||r.katchName||r.close||r.deal||r.bw||r.emp||r.useMobile||r.useLine||mobTotalOf(r)||r.bb||r.denki||r.gas||cardTotalOf(r));
}
function contentParts(r){
  const parts=[];
  for(let i=0;i<MOBILE_ITEMS.length;i++){
    const m=MOBILE_ITEMS[i]; const n=Number(r.mobile[m.key])||0;
    if(n>0){ parts.push(m.label+"×"+n); }
  }
  if(r.bb){ parts.push(r.bb); }
  if(r.denki){ parts.push("でんき"+r.denki); }
  if(r.gas){ parts.push("ガス"+r.gas); }
  const c = r.card || {};
  for(let i=0;i<CARD_ITEMS.length;i++){
    const ci=CARD_ITEMS[i]; const n=Number(c[ci.key])||0;
    if(n>0){ parts.push(ci.s+"×"+n); }
  }
  return parts;
}
function summarize(r){ return contentParts(r).join("、"); }

function App(){
  const [dateStr, setDateStr] = useState(todayStr());
  const [tab, setTab] = useState("entry");
  const [store, setStore] = useState({});
  const [form, setForm] = useState(emptyForm());
  const [editingId, setEditingId] = useState(null);
  const [sync, setSync] = useState(cloudReady() ? "loading" : "local");

  const dateRef = useRef(dateStr);
  useEffect(function(){ dateRef.current = dateStr; setEditingId(null); }, [dateStr]);
  const loadedRef = useRef(false);
  const saveTimer = useRef(null);

  const records = store[dateStr] || [];

  const setRecords = useCallback(function(updater){
    setStore(function(ps){
      const d = dateRef.current;
      const cur = ps[d] || [];
      const next = (typeof updater === "function") ? updater(cur) : updater;
      const ns = Object.assign({}, ps); ns[d] = next; return ns;
    });
  }, []);

  const pullCloud = useCallback(function(){
    if(!cloudReady()){ return; }
    setSync("loading");
    const headers = {}; headers[CLOUD_KEY_HEADER] = JSONBIN_KEY;
    fetch(JSONBIN_BASE + "/" + JSONBIN_BIN_ID + "/latest", { headers: headers })
      .then(function(r){ if(!r.ok){ throw new Error("http " + r.status); } return r.json(); })
      .then(function(j){
        const rec = (j && j.record) ? j.record : {};
        loadedRef.current = true;
        setStore(normalizeStore(rec));
        setSync("saved");
      })
      .catch(function(e){ loadedRef.current = true; setSync("error"); });
  }, []);

  // 初回ロード：ローカル即時 → クラウド取得
  useEffect(function(){
    let local = null;
    try{
      const raw = window.localStorage.getItem(LS_STORE_KEY);
      if(raw){ local = JSON.parse(raw); }
    }catch(e){}
    if(!local || Object.keys(local).length === 0){ local = migrateOldKeys(); }
    if(local && Object.keys(local).length > 0){ setStore(normalizeStore(local)); }
    if(cloudReady()){ pullCloud(); }
    else { loadedRef.current = true; }
  }, [pullCloud]);

  // 保存：ローカルは即時、クラウドはデバウンスPUT
  useEffect(function(){
    try{ window.localStorage.setItem(LS_STORE_KEY, JSON.stringify(store)); }catch(e){}
    if(!cloudReady()){ return; }
    if(!loadedRef.current){ return; }
    setSync("saving");
    if(saveTimer.current){ clearTimeout(saveTimer.current); }
    saveTimer.current = setTimeout(function(){
      const headers = { "Content-Type":"application/json" }; headers[CLOUD_KEY_HEADER] = JSONBIN_KEY;
      fetch(JSONBIN_BASE + "/" + JSONBIN_BIN_ID, { method:"PUT", headers: headers, body: JSON.stringify(store) })
        .then(function(r){ if(!r.ok){ throw new Error("http " + r.status); } setSync("saved"); })
        .catch(function(e){ setSync("error"); });
    }, 800);
  }, [store]);

  const ymd = useMemo(function(){
    const p = dateStr.split("-");
    const dt = new Date(Number(p[0]), Number(p[1])-1, Number(p[2]));
    return { y:p[0], m:String(Number(p[1])), d:String(Number(p[2])), wd:WD[dt.getDay()] };
  }, [dateStr]);

  const setF = useCallback(function(field, value){
    setForm(function(p){ const n=Object.assign({},p); n[field]=value; return n; });
  }, []);
  const setMobile = useCallback(function(key, value){
    setForm(function(p){ const nm=Object.assign({},p.mobile); nm[key]=value; return Object.assign({},p,{mobile:nm}); });
  }, []);
  const adjustMobile = useCallback(function(key, delta){
    setForm(function(p){
      let v=(Number(p.mobile[key])||0)+delta; if(v<0)v=0;
      const nm=Object.assign({},p.mobile); nm[key]=v; return Object.assign({},p,{mobile:nm});
    });
  }, []);
  const onMobileInput = useCallback(function(key, e){
    const digits = e.target.value.replace(/[^0-9]/g,"");
    setMobile(key, digits==="" ? 0 : parseInt(digits,10));
  }, [setMobile]);

  const setCard = useCallback(function(key, value){
    setForm(function(p){ const nc=Object.assign({},p.card); nc[key]=value; return Object.assign({},p,{card:nc}); });
  }, []);
  const adjustCard = useCallback(function(key, delta){
    setForm(function(p){
      let v=(Number(p.card[key])||0)+delta; if(v<0)v=0;
      const nc=Object.assign({},p.card); nc[key]=v; return Object.assign({},p,{card:nc});
    });
  }, []);
  const onCardInput = useCallback(function(key, e){
    const digits = e.target.value.replace(/[^0-9]/g,"");
    setCard(key, digits==="" ? 0 : parseInt(digits,10));
  }, [setCard]);

  const resetForm = useCallback(function(){ setForm(emptyForm()); }, []);

  const [pdfBusy, setPdfBusy] = useState(false);

  const makePdf = useCallback(function(){
    const esc = function(x){ return String(x==null?"":x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); };
    const dateText = ymd.y + "/" + ymd.m + "/" + ymd.d + "（" + ymd.wd + "）";

    let rowsHtml = "";
    if(records.length === 0){
      rowsHtml = '<tr><td colspan="9" style="text-align:center;color:#7a8494;padding:14px">登録がありません</td></tr>';
    }
    records.forEach(function(r, i){
      const name = (r.katch||"") + (r.katchName ? " " + r.katchName : "");
      const useArr = [];
      if(r.useMobile){ useArr.push('<span class="nw">' + esc(r.useMobile) + '</span>'); }
      if(r.useLine){ useArr.push('<span class="nw">' + esc(r.useLine) + '</span>'); }
      const cHtml = contentParts(r).map(function(p){ return '<span class="nw">' + esc(p) + '</span>'; }).join("、");
      const dc = r.deal==="◯" ? "#1f8a4c" : (r.deal==="✕" ? "#c1392b" : "#1f2530");
      rowsHtml += '<tr>'
        + '<td class="num">' + (i+1) + '</td>'
        + '<td class="ce">' + esc(r.time) + '</td>'
        + '<td>' + esc(name) + '</td>'
        + '<td>' + esc(r.close) + '</td>'
        + '<td class="ce" style="color:' + dc + ';font-weight:700">' + esc(r.deal) + '</td>'
        + '<td class="ce">' + esc(r.bw) + '</td>'
        + '<td class="ce">' + esc(r.emp) + '</td>'
        + '<td>' + useArr.join(" / ") + '</td>'
        + '<td>' + cHtml + '</td>'
        + '</tr>';
    });

    const tcards = function(arr){
      return arr.map(function(x){ return '<div class="tc"><div class="tk">' + esc(x[0]) + '</div><div class="tv">' + esc(x[1]) + '</div></div>'; }).join("");
    };
    const gOverview = tcards([["接客数",totals.count],["成約◯",totals.dealO],["成約✕",totals.dealX],["成約率",(totals.rate===null?"−":totals.rate+"%")],["白黒済",totals.bwDone],["社員紹介済",totals.empDone]]);
    const gMobile = tcards(MOBILE_ITEMS.map(function(m){ return [m.label, totals.mob[m.key]]; }).concat([["モバイル合計",totals.mobTotal]]));
    const gBB = tcards(BB_OPTS.slice(1).map(function(o){ return [o, totals.bb[o]]; }));
    const gDG = tcards([["でんき◯",totals.denkiO],["ガス◯",totals.gasO]]);
    const gCard = tcards(CARD_ITEMS.map(function(ci){ return [ci.label, totals.card[ci.key]]; }).concat([["カード合計",totals.cardTotal]]));

    const scoped = ''
      + '#pp-cont{width:760px;background:#fff;padding:18px;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:#1f2530;}'
      + '#pp-cont *{box-sizing:border-box;margin:0;padding:0;}'
      + '#pp-cont .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}'
      + '#pp-cont .h-title{font-size:20px;font-weight:700;}#pp-cont .h-sub{font-size:11px;color:#7a8494;margin-top:2px;}#pp-cont .h-date{font-size:16px;font-weight:700;}'
      + '#pp-cont table{border-collapse:collapse;width:100%;table-layout:fixed;}'
      + '#pp-cont th,#pp-cont td{border:1px solid #c9ced8;padding:5px 7px;font-size:12px;vertical-align:middle;white-space:normal;text-align:left;word-break:break-word;overflow-wrap:anywhere;}'
      + '#pp-cont thead th{background:#2c3340;color:#fff;font-weight:600;white-space:nowrap;}'
      + '#pp-cont .num{width:28px;text-align:center;color:#7a8494;background:#f1f4f8;}'
      + '#pp-cont .ce{text-align:center;white-space:nowrap;}#pp-cont .nw{white-space:nowrap;}'
      + '#pp-cont .sec{font-size:12px;font-weight:700;color:#2c3340;border-left:3px solid #2f6db5;padding-left:7px;margin:14px 0 7px;}'
      + '#pp-cont .cards{display:flex;flex-wrap:wrap;gap:7px;}'
      + '#pp-cont .tc{border:1px solid #c9ced8;border-radius:8px;padding:6px 12px;min-width:80px;text-align:center;}'
      + '#pp-cont .tk{font-size:10px;color:#7a8494;}#pp-cont .tv{font-size:18px;font-weight:700;}';

    const inner = '<style>' + scoped + '</style>'
      + '<div class="head"><div><div class="h-title">接客日報</div><div class="h-sub">キャッチ → クローズ → 成約の記録シート</div></div><div class="h-date">' + dateText + '</div></div>'
      + '<table><colgroup><col style="width:26px"><col style="width:42px"><col style="width:104px"><col style="width:58px"><col style="width:38px"><col style="width:38px"><col style="width:52px"><col style="width:120px"><col></colgroup><thead><tr><th></th><th>時間</th><th>キャッチ</th><th>クローズ</th><th>成約</th><th>白黒</th><th>社員紹介</th><th>利用中</th><th>成約内容</th></tr></thead><tbody>' + rowsHtml + '</tbody></table>'
      + '<div class="sec">概況</div><div class="cards">' + gOverview + '</div>'
      + '<div class="sec">モバイル</div><div class="cards">' + gMobile + '</div>'
      + '<div class="sec">BB</div><div class="cards">' + gBB + '</div>'
      + '<div class="sec">でんき・ガス</div><div class="cards">' + gDG + '</div>'
      + '<div class="sec">PayPayカード</div><div class="cards">' + gCard + '</div>';

    const cont = document.createElement("div");
    cont.id = "pp-cont";
    cont.style.position = "absolute";
    cont.style.left = "-99999px";
    cont.style.top = "0";
    cont.innerHTML = inner;
    document.body.appendChild(cont);

    const finish = function(){ if(cont.parentNode){ cont.parentNode.removeChild(cont); } setPdfBusy(false); };

    if(typeof html2canvas === "undefined" || !window.jspdf){
      finish();
      window.alert("PDF用の部品を読み込めませんでした。通信環境を確認して再度お試しください。");
      return;
    }
    setPdfBusy(true);
    html2canvas(cont, { scale: 2, backgroundColor: "#ffffff" }).then(function(canvas){
      const img = canvas.toDataURL("image/jpeg", 0.92);
      const jsPDF = window.jspdf.jsPDF;
      const pdf = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
      const pw = pdf.internal.pageSize.getWidth();
      const ph = pdf.internal.pageSize.getHeight();
      const margin = 8;
      const availW = pw - margin*2, availH = ph - margin*2;
      let iw = availW, ih = (canvas.height / canvas.width) * iw;
      if(ih > availH){ ih = availH; iw = (canvas.width / canvas.height) * ih; }
      const x = (pw - iw) / 2, y = margin;
      pdf.addImage(img, "JPEG", x, y, iw, ih);
      const fname = "接客日報_" + dateStr + ".pdf";
      const blob = pdf.output("blob");
      finish();
      const file = new File([blob], fname, { type: "application/pdf" });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        navigator.share({ files: [file], title: fname }).catch(function(){ /* キャンセル時は何もしない */ });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = fname;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
      }
    }).catch(function(e){
      finish();
      window.alert("PDF生成に失敗しました：" + (e && e.message ? e.message : e));
    });
  }, [records, totals, ymd, dateStr]);

  const register = useCallback(function(){
    const f = form;
    const mob = emptyMobile(); let mt=0;
    for(let i=0;i<MOBILE_ITEMS.length;i++){ const k=MOBILE_ITEMS[i].key; const n=Number(f.mobile[k])||0; mob[k]=n; mt+=n; }
    const card = emptyCard(); let ct=0;
    for(let i=0;i<CARD_ITEMS.length;i++){ const k=CARD_ITEMS[i].key; const n=Number(f.card[k])||0; card[k]=n; ct+=n; }
    const has = f.katch||f.katchName||f.close||f.deal||f.bw||f.emp||f.useMobile||f.useLine||mt||f.bb||f.denki||f.gas||ct;
    if(!has){ window.alert("内容を入力してください。"); return; }
    if(editingId){
      const upd = { id:editingId, time:f.time?f.time:nowHM(), katch:f.katch, katchName:f.katchName,
        close:f.close, deal:f.deal, bw:f.bw, emp:f.emp, useMobile:f.useMobile, useLine:f.useLine,
        mobile:mob, bb:f.bb, denki:f.denki, gas:f.gas, card:card };
      setRecords(function(prev){ return prev.map(function(r){ return r.id===editingId ? upd : r; }); });
      setEditingId(null);
      resetForm();
      return;
    }
    const rec = { id:newId(), time:f.time?f.time:nowHM(), katch:f.katch, katchName:f.katchName,
      close:f.close, deal:f.deal, bw:f.bw, emp:f.emp, useMobile:f.useMobile, useLine:f.useLine,
      mobile:mob, bb:f.bb, denki:f.denki, gas:f.gas, card:card };
    setRecords(function(prev){ return prev.concat([rec]); });
    resetForm();
  }, [form, resetForm, editingId]);

  const startEdit = useCallback(function(id){
    let rec = null;
    for(let i=0;i<records.length;i++){ if(records[i].id === id){ rec = records[i]; break; } }
    if(!rec){ return; }
    setForm({ time:rec.time||"", katch:rec.katch||"", katchName:rec.katchName||"", close:rec.close||"",
      deal:rec.deal||"", bw:rec.bw||"", emp:rec.emp||"", useMobile:rec.useMobile||"", useLine:rec.useLine||"",
      mobile:Object.assign(emptyMobile(), rec.mobile||{}), bb:rec.bb||"", denki:rec.denki||"", gas:rec.gas||"",
      card:Object.assign(emptyCard(), rec.card||{}) });
    setEditingId(id);
    setTab("entry");
    if(window.scrollTo){ window.scrollTo(0, 0); }
  }, [records]);

  const cancelEdit = useCallback(function(){ setEditingId(null); resetForm(); }, [resetForm]);

  const deleteRecord = useCallback(function(id){
    setRecords(function(prev){ return prev.filter(function(r){ return r.id !== id; }); });
  }, []);

  const updateRecord = useCallback(function(id, field, value){
    setRecords(function(prev){
      return prev.map(function(r){
        if(r.id !== id){ return r; }
        const n = Object.assign({}, r); n[field] = value; return n;
      });
    });
  }, []);

  const clearDay = useCallback(function(){
    if(window.confirm("この日の登録をすべて消去します。よろしいですか？")){ setRecords([]); }
  }, []);

  const totals = useMemo(function(){
    const mob = emptyMobile(); let mobTotal=0;
    const card = emptyCard(); let cardTotal=0;
    const bb = {}; for(let i=1;i<BB_OPTS.length;i++){ bb[BB_OPTS[i]]=0; }
    let denkiO=0, gasO=0, dealO=0, dealX=0, bwDone=0, empDone=0;
    records.forEach(function(r){
      for(let i=0;i<MOBILE_ITEMS.length;i++){ const k=MOBILE_ITEMS[i].key; const n=Number(r.mobile[k])||0; mob[k]+=n; mobTotal+=n; }
      const rc = r.card || {};
      for(let i=0;i<CARD_ITEMS.length;i++){ const k=CARD_ITEMS[i].key; const n=Number(rc[k])||0; card[k]+=n; cardTotal+=n; }
      if(r.bb && bb.hasOwnProperty(r.bb)){ bb[r.bb]+=1; }
      if(r.denki==="◯") denkiO++;
      if(r.gas==="◯") gasO++;
      if(r.deal==="◯") dealO++;
      if(r.deal==="✕") dealX++;
      if(r.bw==="済") bwDone++;
      if(r.emp==="済") empDone++;
    });
    return { mob:mob, mobTotal:mobTotal, bb:bb, denkiO:denkiO, gasO:gasO, card:card, cardTotal:cardTotal,
      dealO:dealO, dealX:dealX, bwDone:bwDone, empDone:empDone, count:records.length,
      rate: records.length>0 ? Math.round((dealO/records.length)*1000)/10 : null };
  }, [records]);

  const exportCsv = useCallback(function(){
    const head = ["No","時間","キャッチ区分","キャッチ名前","クローズ","成約","白黒","社員紹介",
      "現在利用中(携帯)","現在利用中(回線)","SB端末MNP","SB SIM MNP","YM端末MNP","YM SIM MNP","BB","でんき","ガス","PayPayノーマル","PayPay GOLD","家族カード"];
    const lines = [head.join(",")];
    records.forEach(function(r, i){
      const cols = [ String(i+1), r.time, r.katch, r.katchName, r.close, r.deal, r.bw, r.emp,
        r.useMobile, r.useLine,
        String(Number(r.mobile.sbT)||0), String(Number(r.mobile.sbS)||0),
        String(Number(r.mobile.ymT)||0), String(Number(r.mobile.ymS)||0),
        r.bb, r.denki, r.gas,
        String(Number(r.card.cNormal)||0), String(Number(r.card.cGold)||0), String(Number(r.card.cFamily)||0)
      ].map(function(c){
        const s = (c==null?"":String(c));
        if(s.indexOf(",")>=0||s.indexOf('"')>=0||s.indexOf("\n")>=0){ return '"'+s.split('"').join('""')+'"'; }
        return s;
      });
      lines.push(cols.join(","));
    });
    const csv = lines.join("\r\n");
    const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], { type:"text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "接客日報_"+dateStr+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, [records, dateStr]);

  function selOpts(arr){
    return arr.map(function(o){ return <option key={o} value={o}>{o===""?"−":o}</option>; });
  }
  function dealCls(v){ return v==="◯"?"c-deal deal-ok":(v==="✕"?"c-deal deal-ng":"c-deal"); }

  const recent = records.slice().reverse().slice(0,6);

  return (
    <div className="wrap">
      <div className="titlebar">
        <h1>接客日報<span>キャッチ → クローズ → 成約の記録シート</span></h1>
        <div className="datebox">
          <label htmlFor="d">日付</label>
          <input id="d" type="date" value={dateStr} onChange={function(e){ setDateStr(e.target.value); }} />
          <span className="ymd">{ymd.y}/{ymd.m}/{ymd.d}（<span className="wd">{ymd.wd}</span>）</span>
        </div>
        <span className={"sync sync-"+sync} onClick={pullCloud} title="タップで再読み込み">{
          sync==="loading" ? "読込中…" :
          sync==="saving" ? "保存中…" :
          sync==="saved" ? "● 同期済み" :
          sync==="error" ? "△ 同期エラー（タップで再試行）" :
          "ローカル保存のみ"
        }</span>
      </div>

      <div className="tabs">
        <div className={tab==="entry"?"tab active":"tab"} onClick={function(){ setTab("entry"); }}>入力フォーム</div>
        <div className={tab==="sheet"?"tab active":"tab"} onClick={function(){ setTab("sheet"); }}>集計シート（{records.length}）</div>
      </div>

      {tab==="entry" ? (
        <div className="card-box">
          <h2>{editingId ? "編集中（内容を直して更新）" : "新規入力"}</h2>
          <div className="fgrid">
            <div className="f-field">
              <label>時間</label>
              <div className="time-row">
                <input value={form.time} placeholder="登録時に自動" onChange={function(e){ setF("time", e.target.value); }} />
                <button type="button" className="time-now" onClick={function(){ setF("time", nowHM()); }}>現在</button>
              </div>
            </div>
            <div className="f-field catch-field">
              <label>キャッチ</label>
              <div className="catch-row">
                <select className="catch-sel" value={form.katch} onChange={function(e){ setF("katch", e.target.value); }}>{selOpts(KATCH_OPTS)}</select>
                <input className="catch-name" placeholder="名前" value={form.katchName} onChange={function(e){ setF("katchName", e.target.value); }} />
              </div>
            </div>
            <div className="f-field">
              <label>クローズ</label>
              <input value={form.close} onChange={function(e){ setF("close", e.target.value); }} />
            </div>
            <div className="f-field">
              <label>成約</label>
              <select value={form.deal} onChange={function(e){ setF("deal", e.target.value); }}>{selOpts(OX_OPTS)}</select>
            </div>
            <div className="f-field">
              <label>現在利用中（携帯）</label>
              <select value={form.useMobile} onChange={function(e){ setF("useMobile", e.target.value); }}>{selOpts(USE_MOBILE_OPTS)}</select>
            </div>
            <div className="f-field">
              <label>現在利用中（回線）</label>
              <select value={form.useLine} onChange={function(e){ setF("useLine", e.target.value); }}>{selOpts(USE_LINE_OPTS)}</select>
            </div>
          </div>

          <div className="sec-title">成約内容</div>
          <div className="content-box">
            <p className="sub-lab">モバイル（件数）</p>
            <div className="mob-list">
              {MOBILE_ITEMS.map(function(m){
                const v = Number(form.mobile[m.key])||0;
                return (
                  <div className="mob-row" key={m.key}>
                    <span className="lab">{m.label}</span>
                    <span className="stepper">
                      <button type="button" onClick={function(){ adjustMobile(m.key,-1); }}>−</button>
                      <input inputMode="numeric" value={v===0?"":String(v)}
                        onChange={function(e){ onMobileInput(m.key,e); }} />
                      <button type="button" onClick={function(){ adjustMobile(m.key,1); }}>＋</button>
                    </span>
                  </div>
                );
              })}
            </div>
            <div className="content-grid">
              <div className="f-field">
                <label>BB</label>
                <select value={form.bb} onChange={function(e){ setF("bb", e.target.value); }}>{selOpts(BB_OPTS)}</select>
              </div>
              <div className="f-field">
                <label>でんき</label>
                <select value={form.denki} onChange={function(e){ setF("denki", e.target.value); }}>{selOpts(OX_OPTS)}</select>
              </div>
              <div className="f-field">
                <label>ガス</label>
                <select value={form.gas} onChange={function(e){ setF("gas", e.target.value); }}>{selOpts(OX_OPTS)}</select>
              </div>
            </div>
            <p className="sub-lab" style={{marginTop:"14px"}}>PayPayカード（件数）</p>
            <div className="mob-list">
              {CARD_ITEMS.map(function(ci){
                const v = Number(form.card[ci.key])||0;
                return (
                  <div className="mob-row" key={ci.key}>
                    <span className="lab">{ci.label}</span>
                    <span className="stepper">
                      <button type="button" onClick={function(){ adjustCard(ci.key,-1); }}>−</button>
                      <input inputMode="numeric" value={v===0?"":String(v)}
                        onChange={function(e){ onCardInput(ci.key,e); }} />
                      <button type="button" onClick={function(){ adjustCard(ci.key,1); }}>＋</button>
                    </span>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="entry-actions">
            <button type="button" className="btn primary" onClick={register}>{editingId ? "更新" : "登録"}</button>
            {editingId
              ? <button type="button" className="btn" onClick={cancelEdit}>編集をやめる</button>
              : <button type="button" className="btn" onClick={resetForm}>クリア</button>}
          </div>

          <div className="recent">
            <h3>直近の登録</h3>
            {recent.length===0
              ? <div className="empty">まだ登録がありません</div>
              : <div className="rlist">
                  {recent.map(function(r){
                    const s = summarize(r);
                    const name = (r.katch || "") + (r.katchName ? " " + r.katchName : "");
                    return (
                      <div className="ritem" key={r.id}>
                        <span className="meta">{r.time}</span>
                        <span className="body">
                          <b>{name || "（キャッチ未入力）"}</b>
                          {r.deal ? <b style={{marginLeft:"6px",color:r.deal==="◯"?"#1f8a4c":"#c1392b"}}>{r.deal}</b> : null}
                          <span className="det">{s || "成約内容なし"}</span>
                        </span>
                        <span className="ritem-ops">
                          <button className="e-btn" onClick={function(){ startEdit(r.id); }}>編集</button>
                          <button className="x-btn" onClick={function(){ deleteRecord(r.id); }}>削除</button>
                        </span>
                      </div>
                    );
                  })}
                </div>}
          </div>
        </div>
      ) : (
        <div className="sheet-view">
          <div className="toolbar">
            <button className="btn" onClick={pullCloud}>再読込</button>
            <button className="btn primary" onClick={makePdf} disabled={pdfBusy}>{pdfBusy ? "PDF作成中…" : "PDF保存・共有"}</button>
            <button className="btn" onClick={exportCsv}>CSV出力</button>
            <button className="btn danger" onClick={clearDay}>この日を消去</button>
          </div>

          <div className="card-box">
            <div className="tot-group">
              <h3>概況</h3>
              <div className="tot-cards">
                <div className="tcard"><div className="k">接客数</div><div className="v">{totals.count}</div></div>
                <div className="tcard"><div className="k">成約 ◯</div><div className="v" style={{color:"#1f8a4c"}}>{totals.dealO}</div></div>
                <div className="tcard"><div className="k">成約 ✕</div><div className="v" style={{color:"#c1392b"}}>{totals.dealX}</div></div>
                <div className="tcard accent"><div className="k">成約率</div><div className="v">{totals.rate===null?"−":totals.rate+"%"}</div></div>
                <div className="tcard"><div className="k">白黒 済</div><div className="v">{totals.bwDone}</div></div>
                <div className="tcard"><div className="k">社員紹介 済</div><div className="v">{totals.empDone}</div></div>
              </div>
            </div>
            <div className="tot-group">
              <h3>モバイル</h3>
              <div className="tot-cards">
                {MOBILE_ITEMS.map(function(m){
                  return <div className="tcard" key={m.key}><div className="k">{m.label}</div><div className="v">{totals.mob[m.key]}</div></div>;
                })}
                <div className="tcard accent"><div className="k">モバイル合計</div><div className="v">{totals.mobTotal}</div></div>
              </div>
            </div>
            <div className="tot-group">
              <h3>BB</h3>
              <div className="tot-cards">
                {BB_OPTS.slice(1).map(function(o){
                  return <div className="tcard" key={o}><div className="k">{o}</div><div className="v">{totals.bb[o]}</div></div>;
                })}
              </div>
            </div>
            <div className="tot-group">
              <h3>でんき・ガス</h3>
              <div className="tot-cards">
                <div className="tcard"><div className="k">でんき ◯</div><div className="v">{totals.denkiO}</div></div>
                <div className="tcard"><div className="k">ガス ◯</div><div className="v">{totals.gasO}</div></div>
              </div>
            </div>
            <div className="tot-group">
              <h3>PayPayカード</h3>
              <div className="tot-cards">
                {CARD_ITEMS.map(function(ci){
                  return <div className="tcard" key={ci.key}><div className="k">{ci.label}</div><div className="v">{totals.card[ci.key]}</div></div>;
                })}
                <div className="tcard accent"><div className="k">カード合計</div><div className="v">{totals.cardTotal}</div></div>
              </div>
            </div>
          </div>

          <div className="sheet">
            <div className="scroll">
              <table>
                <thead>
                  <tr>
                    <th className="rownum"></th>
                    <th>時間</th><th>キャッチ</th><th>クローズ</th><th>成約</th>
                    <th>白黒</th><th>社員紹介</th><th>利用中</th><th>成約内容</th><th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  {records.length===0
                    ? <tr><td className="empty" colSpan="10">まだ登録がありません。「入力フォーム」タブから登録してください。</td></tr>
                    : records.map(function(r, i){
                        const name = (r.katch||"") + (r.katchName? " "+r.katchName : "");
                        return (
                          <tr key={r.id}>
                            <td className="rownum">{i+1}</td>
                            <td className="c-time">{r.time}</td>
                            <td>{name}</td>
                            <td>{r.close}</td>
                            <td className="c-deal-cell"><span className={dealCls(r.deal)}>{r.deal}</span></td>
                            <td className="c-sel">
                              <select className="mini-sel" value={r.bw} onChange={function(e){ updateRecord(r.id,"bw",e.target.value); }}>{selOpts(DONE_OPTS)}</select>
                            </td>
                            <td className="c-sel">
                              <select className="mini-sel" value={r.emp} onChange={function(e){ updateRecord(r.id,"emp",e.target.value); }}>{selOpts(DONE_OPTS)}</select>
                            </td>
                            <td className="c-use">
                              {r.useMobile ? <span className="ci">{r.useMobile}</span> : null}
                              {r.useMobile && r.useLine ? " / " : null}
                              {r.useLine ? <span className="ci">{r.useLine}</span> : null}
                            </td>
                            <td className="c-content">
                              {contentParts(r).map(function(p, idx){
                                return <React.Fragment key={idx}>{idx>0?"、":""}<span className="ci">{p}</span></React.Fragment>;
                              })}
                            </td>
                            <td className="c-op">
                              <button className="e-btn" onClick={function(){ startEdit(r.id); }}>編集</button>
                              <button className="x-btn" onClick={function(){ deleteRecord(r.id); }}>削除</button>
                            </td>
                          </tr>
                        );
                      })}
                </tbody>
              </table>
            </div>
          </div>

          <div className="hint">
            ・このシートは「入力フォーム」タブで登録した内容が一覧・集計されます。<br />
            ・成約内容のモバイルは件数（複数獲得）に対応。集計の「モバイル合計」は全件数の総和です。<br />
            ・成約率＝成約◯ ÷ 接客数 ×100（％）。各行の「削除」で取り消し。CSV出力・印刷に対応（印刷時は操作列を除外）。
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
